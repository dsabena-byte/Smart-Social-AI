<script>
  // EVENTO 4: purchase_completed
  (function() {
    const params = new URLSearchParams(window.location.search);
    const extRef    = params.get('external_reference') || '';
    const paymentId = params.get('payment_id') || params.get('collection_id') || '';
    const plan    = extRef.includes('pro-sub') ? 'pro-sub' : extRef.includes('pro') ? 'pro' : 'starter';
    const value   = (plan === 'pro' || plan === 'pro-sub') ? 100 : 20;
    const itemName = (plan === 'pro' || plan === 'pro-sub') ? 'Reporte Pro' : 'Reporte Inicial';

    gtag('event', 'purchase', {
      transaction_id: paymentId,
      value: value,
      currency: 'USD',
      items: [{ item_name: itemName, quantity: 1, price: value }]
    });

  })();
